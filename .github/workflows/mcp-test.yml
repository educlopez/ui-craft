name: mcp-test

on:
  push:
    paths:
      - 'mcp/**'
      # Fix 11: check-anti-slop depends on scripts/detect.mjs — changes there must trigger MCP CI
      - 'scripts/detect.mjs'
      - 'scripts/detect.test.mjs'
  pull_request:
    paths:
      - 'mcp/**'
      - 'scripts/detect.mjs'
      - 'scripts/detect.test.mjs'

jobs:
  mcp-test:
    name: MCP Server Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install MCP dependencies
        run: cd mcp && npm install
      - name: Run MCP tests
        run: cd mcp && npm test
