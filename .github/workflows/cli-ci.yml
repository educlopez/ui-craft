name: CLI CI

# Runs Go tests, vet, fmt, lint, and vuln-scan for the cli/ package.
# Per-harness assets are hand-authored and committed under cli/assets/ — no generation step.

on:
  push:
    paths:
      - 'cli/**'
      - '.github/workflows/cli-ci.yml'
  pull_request:
    paths:
      - 'cli/**'
      - '.github/workflows/cli-ci.yml'

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Run tests (race detector)
        run: cd cli && go test -race ./...

  vet-fmt:
    name: Vet + Fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: go vet
        run: cd cli && go vet ./...

      - name: gofmt (fail on any unformatted file)
        run: |
          FILES=$(cd cli && gofmt -l .)
          if [ -n "$FILES" ]; then
            echo "Unformatted files:"
            echo "$FILES"
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: cli

  govulncheck:
    name: Vuln Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: cd cli && govulncheck ./...
